upstream techustad_app {
    server techustad-web-1:3001;
    server techustad-web-2:3002;
    server techustad-web-3:3003;
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ──
server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/techustad.crt;
    ssl_certificate_key /etc/nginx/certs/techustad.key;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # Proxy all requests to the Node.js app
    location / {
        proxy_pass         http://techustad_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://techustad_app/health;
    }
}
