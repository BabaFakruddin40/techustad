global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'techustad-monitor'

scrape_configs:
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:3000']
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
